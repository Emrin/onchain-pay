apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nbxplorer-data
  namespace: crypto-demo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nbxplorer
  namespace: crypto-demo
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nbxplorer
  template:
    metadata:
      labels:
        app: nbxplorer
    spec:
      initContainers:
        - name: init-db
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -p 5432 -U postgres; do
                echo "Waiting for postgres..."; sleep 2
              done
              psql -h postgres -U postgres -tc "SELECT 1 FROM pg_database WHERE datname='nbxplorer'" \
                | grep -q 1 || psql -h postgres -U postgres -c "CREATE DATABASE nbxplorer"
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
      containers:
        - name: nbxplorer
          image: nicolasdorier/nbxplorer:2.6.1
          ports:
            - containerPort: 32838
          env:
            - name: NBXPLORER_NETWORK
              value: regtest
            - name: NBXPLORER_BIND
              value: "0.0.0.0:32838"
            - name: NBXPLORER_NOAUTH
              value: "1"
            - name: NBXPLORER_CHAINS
              value: "BTC,LTC"
            - name: NBXPLORER_BTCRPCURL
              value: http://bitcoind:18443
            - name: NBXPLORER_BTCRPCUSER
              value: bitcoin
            - name: NBXPLORER_BTCRPCPASSWORD
              value: bitcoin
            - name: NBXPLORER_BTCNODEENDPOINT
              value: bitcoind:18444
            - name: NBXPLORER_LTCRPCURL
              value: http://litecoind:19443
            - name: NBXPLORER_LTCRPCUSER
              value: litecoin
            - name: NBXPLORER_LTCRPCPASSWORD
              value: litecoin
            - name: NBXPLORER_LTCNODEENDPOINT
              value: litecoind:19444
            - name: NBXPLORER_POSTGRES
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: NBXPLORER_POSTGRES
          volumeMounts:
            - name: data
              mountPath: /datadir
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nbxplorer-data
