apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: crypto-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      # Pin to the "api VPS" node
      nodeSelector:
        vps-role: api
      containers:
        - name: api
          image: crypto-api:latest
          # Never pull — image was imported directly via k3d image import
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: JWT_SECRET
            - name: NETWORK
              value: "mainnet"
            - name: TOR_HTTP_PROXY
              value: "http://tor:8118"
            - name: NBXPLORER_URL
              value: "http://nbxplorer:32838"
            - name: MONERO_WALLET_RPC_URL
              value: "http://xmr-wallet:18082/json_rpc"
            - name: MONERO_WALLET_NAME
              value: "crypto-demo"
            - name: XMR_DAEMON_NODES
              valueFrom:
                secretKeyRef:
                  name: wallet-credentials
                  key: XMR_DAEMON_NODES
            - name: XMR_TOR_PROXY
              valueFrom:
                secretKeyRef:
                  name: wallet-credentials
                  key: XMR_TOR_PROXY
                  optional: true
            - name: INVOICE_TTL_MS
              value: "1800000"
            - name: BTC_XPUB
              valueFrom:
                secretKeyRef:
                  name: wallet-credentials
                  key: BTC_XPUB
            - name: LTC_XPUB
              valueFrom:
                secretKeyRef:
                  name: wallet-credentials
                  key: LTC_XPUB
