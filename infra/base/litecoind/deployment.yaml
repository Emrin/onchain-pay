apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: litecoind-data
  namespace: crypto-demo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 8Gi  # pruned mainnet: ~2GB blocks + ~4GB chainstate/indexes
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litecoind
  namespace: crypto-demo
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: litecoind
  template:
    metadata:
      labels:
        app: litecoind
    spec:
      containers:
        - name: litecoind
          image: btcpayserver/litecoin:0.21.2.1
          command: ["litecoind"]
          args:
            - "-server"
            - "-prune=2000"
            - "-rpcuser=$(LITECOIND_RPC_USER)"
            - "-rpcpassword=$(LITECOIND_RPC_PASSWORD)"
            - "-rpcallowip=0.0.0.0/0"
            - "-rpcbind=0.0.0.0"
            - "-whitelist=0.0.0.0/0"
            - "-listen=1"
            - "-listenonion=0"
            - "-datadir=/data"
          env:
            - name: LITECOIND_RPC_USER
              valueFrom:
                secretKeyRef:
                  name: wallet-credentials
                  key: LITECOIND_RPC_USER
            - name: LITECOIND_RPC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wallet-credentials
                  key: LITECOIND_RPC_PASSWORD
          ports:
            - containerPort: 9332
              name: rpc
            - containerPort: 9333
              name: p2p
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
            limits:
              memory: "512Mi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: litecoind-data
---
apiVersion: v1
kind: Service
metadata:
  name: litecoind
  namespace: crypto-demo
spec:
  selector:
    app: litecoind
  ports:
    - name: rpc
      port: 9332
      targetPort: 9332
    - name: p2p
      port: 9333
      targetPort: 9333
