apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: litecoind-data
  namespace: crypto-demo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litecoind
  namespace: crypto-demo
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: litecoind
  template:
    metadata:
      labels:
        app: litecoind
    spec:
      containers:
        - name: litecoind
          image: btcpayserver/litecoin:0.21.2.1
          command: ["litecoind"]
          args:
            - "-regtest"
            - "-server"
            - "-rpcuser=litecoin"
            - "-rpcpassword=litecoin"
            - "-rpcallowip=0.0.0.0/0"
            - "-rpcbind=0.0.0.0"
            - "-whitelist=0.0.0.0/0"
            - "-listen=1"
            - "-listenonion=0"
            - "-datadir=/data"
          ports:
            - containerPort: 19443
              name: rpc
            - containerPort: 19444
              name: p2p
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
            limits:
              memory: "512Mi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: litecoind-data
---
apiVersion: v1
kind: Service
metadata:
  name: litecoind
  namespace: crypto-demo
spec:
  selector:
    app: litecoind
  ports:
    - name: rpc
      port: 19443
      targetPort: 19443
    - name: p2p
      port: 19444
      targetPort: 19444
